{% extends "base.html" %}

{% block content %}

<!-- Session check: HTMX loads this on page arrival -->
<div id="session-area"
     hx-get="/session-check"
     hx-trigger="load"
     hx-swap="innerHTML">
</div>

<!-- Upload area -->
<div id="upload-area">
  <section class="upload-card"
           x-data="uploadForm()"
           x-cloak>

    <h1 class="upload-title">ছবি আপলোড করুন</h1>
    <p class="upload-sub">সর্বোচ্চ ৫টি ছবি &bull; প্রতিটি সর্বোচ্চ ১০ MB &bull; ১ ঘণ্টা সক্রিয়</p>

    <form hx-post="/upload"
          hx-target="#upload-area"
          hx-swap="innerHTML"
          hx-encoding="multipart/form-data"
          hx-indicator="#upload-spinner">

      <!-- Drop zone -->
      <label class="drop-zone"
             :class="{ 'drag-over': isDragging, 'has-files': previews.length > 0 }"
             @dragover.prevent="isDragging = true"
             @dragleave.prevent="isDragging = false"
             @drop.prevent="handleDrop($event)"
             for="file-input">

        <div class="drop-icon" x-show="previews.length === 0">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39,18.39A5,5,0,0,0,18,9h-1.26A8,8,0,1,0,3,16.3"/>
          </svg>
          <p class="drop-text">ছবি টেনে এনে ছাড়ুন</p>
          <p class="drop-sub">অথবা ক্লিক করে নির্বাচন করুন</p>
        </div>

        <!-- File counter when files are selected -->
        <div class="file-count-badge" x-show="previews.length > 0" x-text="previews.length + '/5 ছবি নির্বাচিত'"></div>

        <input id="file-input"
               type="file"
               name="files"
               multiple
               accept="image/jpeg,image/png,image/gif,image/webp"
               x-ref="fileInput"
               @change="handleFiles($event.target.files)"
               class="visually-hidden">
      </label>

      <!-- Preview grid -->
      <div class="preview-grid" x-show="previews.length > 0" x-cloak>
        <template x-for="(p, i) in previews" :key="i">
          <div class="preview-item">
            <img :src="p.url" :alt="p.name" class="preview-img" loading="lazy">
            <button type="button"
                    class="remove-btn"
                    @click.prevent="removeFile(i)"
                    aria-label="সরান">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
            <span class="preview-size" x-text="formatSize(p.size)"></span>
          </div>
        </template>

        <!-- Add more (if < 5) -->
        <label class="preview-add" x-show="previews.length < 5" for="file-input" aria-label="আরও ছবি যোগ করুন">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </label>
      </div>

      <!-- Actions -->
      <div class="upload-actions">
        <!-- Spinner (HTMX indicator) -->
        <div id="upload-spinner" class="spinner htmx-indicator" role="status" aria-label="আপলোড হচ্ছে...">
          <div class="spinner-ring"></div>
        </div>

        <button type="submit"
                class="btn btn-primary"
                :disabled="files.length === 0">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39,18.39A5,5,0,0,0,18,9h-1.26A8,8,0,1,0,3,16.3"/>
          </svg>
          আপলোড করুন
        </button>
      </div>
    </form>
  </section>
</div>

<script>
function uploadForm() {
  return {
    files: [],
    previews: [],
    isDragging: false,
    isUploading: false,

    handleFiles(fileList) {
      const arr = Array.from(fileList).slice(0, 5);
      this.files = arr;
      this.previews = [];
      arr.forEach(f => {
        const r = new FileReader();
        r.onload = e => this.previews.push({ url: e.target.result, name: f.name, size: f.size });
        r.readAsDataURL(f);
      });
    },

    handleDrop(e) {
      this.isDragging = false;
      const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
      const dropped = Array.from(e.dataTransfer.files)
        .filter(f => allowed.includes(f.type))
        .slice(0, 5);
      if (!dropped.length) return;
      const dt = new DataTransfer();
      dropped.forEach(f => dt.items.add(f));
      this.$refs.fileInput.files = dt.files;
      this.handleFiles(dropped);
    },

    removeFile(i) {
      this.files.splice(i, 1);
      this.previews.splice(i, 1);
      const dt = new DataTransfer();
      this.files.forEach(f => dt.items.add(f));
      this.$refs.fileInput.files = dt.files;
    },

    formatSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
      return (b / (1024 * 1024)).toFixed(1) + ' MB';
    }
  };
}
</script>
{% endblock %}
