<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>{% block title %}ImageShare — ছবি শেয়ার করুন সহজে{% endblock %}</title>
  <meta name="description" content="{% block description %}ছবি আপলোড করুন, একটি ছোট লিংক পান এবং যে কারো সাথে শেয়ার করুন। লিংক ১ ঘণ্টা সক্রিয় থাকে, তারপর স্বয়ংক্রিয়ভাবে মুছে যায়।{% endblock %}">
  <meta name="keywords" content="image share, ছবি শেয়ার, temporary image link, photo share, short link, mediaghor">
  <meta name="author" content="MediaGhor">
  <meta name="robots" content="{% block robots %}index, follow{% endblock %}">
  <link rel="canonical" href="{% block canonical %}{{ site_url }}{% endblock %}">

  <!-- Open Graph -->
  <meta property="og:type"        content="{% block og_type %}website{% endblock %}">
  <meta property="og:site_name"   content="{{ site_name }}">
  <meta property="og:title"       content="{% block og_title %}ImageShare — সহজে ছবি শেয়ার করুন{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}ছবি আপলোড করুন, ছোট লিংক পান। ১ ঘণ্টা সক্রিয়।{% endblock %}">
  <meta property="og:url"         content="{% block og_url %}{{ site_url }}{% endblock %}">
  <meta property="og:image"       content="{% block og_image %}{{ site_url }}/static/og-cover.svg{% endblock %}">
  <meta property="og:locale"      content="bn_BD">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{% block tw_title %}ImageShare{% endblock %}">
  <meta name="twitter:description" content="{% block tw_desc %}ছবি আপলোড করুন, ছোট লিংক পান। ১ ঘণ্টা সক্রিয়।{% endblock %}">
  <meta name="twitter:image"       content="{% block tw_image %}{{ site_url }}/static/og-cover.svg{% endblock %}">

  <!-- Schema.org JSON-LD -->
  {% block jsonld %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "ImageShare",
    "url": "{{ site_url }}",
    "description": "Temporary image sharing — upload up to 5 images, get a short link, share with anyone. Auto-deletes after 1 hour.",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "publisher": { "@type": "Organization", "name": "MediaGhor", "url": "https://mediaghor.com" }
  }
  </script>
  {% endblock %}

  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- Alpine.js (defer so it doesn't block render) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <!-- HTMX -->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
</head>
<body>

<header class="site-header">
  <a href="/" class="logo" aria-label="ImageShare হোম">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21,15 16,10 5,21"/>
    </svg>
    <span>ImageShare</span>
  </a>
  <span class="badge-temp">১ ঘণ্টা</span>
</header>

<main class="site-main">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <p>আপলোড করা ছবি ১ ঘণ্টা পর স্বয়ংক্রিয়ভাবে মুছে যায় &mdash; <a href="https://mediaghor.com" rel="noopener">MediaGhor</a></p>
</footer>

</body>
</html>
