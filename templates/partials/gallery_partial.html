{% if error %}
<div class="upload-error visible" role="alert"
     x-data x-init="setTimeout(() => $el.remove(), 5000)">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  <span>{{ error }}</span>
  <button class="error-dismiss" onclick="this.parentElement.remove()" aria-label="Dismiss">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>
{% endif %}

<div class="gallery" x-data="{ active: null, activeId: null }">
  {% for img in images %}
  <figure class="gallery-item"
          @click="active = '/uploads/{{ group_id }}/{{ img.filename }}'; activeId = {{ img.id }}"
          role="button" tabindex="0"
          @keydown.enter="active = '/uploads/{{ group_id }}/{{ img.filename }}'"
          aria-label="View {{ img.original_name }}">

    <img src="/uploads/{{ group_id }}/{{ img.filename }}"
         alt="{{ img.original_name }}"
         class="gallery-img"
         loading="{% if loop.index <= 2 %}eager{% else %}lazy{% endif %}"
         decoding="async">

    <!-- Overlay: expiry badge + download -->
    <div class="gallery-overlay">
      <span class="img-expiry-badge">{{ img.minutes_left }}m</span>
      <a href="/uploads/{{ group_id }}/{{ img.filename }}"
         download="{{ img.original_name }}"
         class="img-dl-btn"
         @click.stop
         aria-label="Download {{ img.original_name }}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21,15v4a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2v-4"/>
          <polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
      </a>
    </div>

    {% if is_owner %}
    <!-- Delete image button (owner only) -->
    <button class="img-delete-btn"
            hx-post="/s/{{ code }}/image/{{ img.id }}/delete"
            hx-target="#gallery-container"
            hx-swap="innerHTML"
            hx-confirm="Remove this image?"
            @click.stop
            aria-label="Delete image">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="3,6 5,6 21,6"/>
        <path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/>
        <path d="M10,11v6"/><path d="M14,11v6"/>
        <path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1V6"/>
      </svg>
    </button>
    {% endif %}
  </figure>
  {% endfor %}

  <!-- Lightbox -->
  <div class="lightbox" x-show="active" x-cloak
       @click="active = null"
       @keydown.escape.window="active = null"
       role="dialog" aria-modal="true">
    <button class="lightbox-close" @click="active = null" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <a :href="active" :download="true" class="lightbox-dl-btn" @click.stop aria-label="Download">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21,15v4a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2v-4"/>
        <polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </a>
    <img :src="active" class="lightbox-img" alt="Full size image" @click.stop>
  </div>
</div>

<!-- Add more images (owner + < 5 images) -->
{% if can_add %}
<div class="add-more-wrap" x-data="{ open: false, ...uploadForm({{ 5 - images|length }}) }">
  <button @click="open = !open; if(!open){ files=[]; previews=[]; }"
          class="btn-add-more"
          :aria-expanded="open">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    <span>Add More Images</span>
    <span class="capacity-tag">{{ images|length }} / 5</span>
  </button>

  <div x-show="open" x-cloak class="add-form-panel">
    <form hx-post="/s/{{ code }}/add-images"
          hx-target="#gallery-container"
          hx-swap="innerHTML"
          hx-encoding="multipart/form-data"
          hx-indicator="#add-spinner">

      <label class="drop-zone drop-zone-sm"
             :class="{ 'drag-over': isDragging, 'has-files': previews.length > 0 }"
             @dragover.prevent="isDragging = true"
             @dragleave.prevent="isDragging = false"
             @drop.prevent="handleDrop($event)"
             for="add-file-input">
        <div class="drop-icon" x-show="previews.length === 0">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
            <polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39,18.39A5,5,0,0,0,18,9h-1.26A8,8,0,1,0,3,16.3"/>
          </svg>
          <p class="drop-text" style="font-size:.85rem">Drop or click to add</p>
          <p class="drop-sub">Up to {{ 5 - images|length }} more image(s)</p>
        </div>
        <div class="file-count-badge" x-show="previews.length > 0" x-text="previews.length + ' selected'"></div>
        <input id="add-file-input" type="file" name="files" multiple
               accept="image/jpeg,image/png,image/gif,image/webp"
               x-ref="fileInput"
               @change="handleFiles($event.target.files)"
               class="visually-hidden">
      </label>

      <div class="preview-grid preview-grid-sm" x-show="previews.length > 0" x-cloak>
        <template x-for="(p, i) in previews" :key="i">
          <div class="preview-item">
            <img :src="p.url" :alt="p.name" class="preview-img" loading="lazy">
            <button type="button" class="remove-btn" @click.prevent="removeFile(i)" aria-label="Remove">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </template>
      </div>

      <div class="add-form-actions">
        <div id="add-spinner" class="spinner htmx-indicator"><div class="spinner-ring"></div></div>
        <button type="button" @click="open = false; files=[]; previews=[];" class="btn btn-ghost btn-sm">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm" :disabled="files.length === 0">
          Add <span x-show="files.length > 0" x-text="files.length"></span> Image<span x-show="files.length > 1">s</span>
        </button>
      </div>
    </form>
  </div>
</div>
{% endif %}
