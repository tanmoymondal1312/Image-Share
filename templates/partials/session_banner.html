<div class="session-panel">
  <div class="session-panel-hdr">
    <span class="session-panel-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>
      </svg>
      Your Active Uploads
    </span>
    <span class="session-panel-count">{{ total }} / 3 group{{ 's' if total != 1 }}</span>
  </div>

  {% for g in groups %}
  <div class="group-card" x-data="countdown('{{ g.min_expires_at }}')" x-init="init()">

    <div class="group-card-icon" aria-hidden="true">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21,15 16,10 5,21"/>
      </svg>
    </div>

    <div class="group-info">
      <span class="group-img-count">{{ g.img_count }} image{{ 's' if g.img_count != 1 }}</span>
      <code class="group-code">/s/{{ g.short_code }}</code>
    </div>

    <span class="group-timer" :class="{ 'expiring': minutesLeft < 10 }" x-text="timeLeft">…</span>

    <div class="group-actions">
      <a href="/s/{{ g.short_code }}" class="btn btn-sm btn-primary" target="_blank" rel="noopener">View</a>

      <div x-data="copyLink()">
        <button class="btn btn-sm btn-outline"
                :class="{ 'copied': copied }"
                @click="doCopy('{{ site_url }}/s/{{ g.short_code }}')"
                x-text="copied ? 'Copied!' : 'Copy'">
        </button>
      </div>

      <button class="btn btn-sm btn-danger-outline"
              hx-post="/s/{{ g.short_code }}/delete-from-banner"
              hx-confirm="Delete this group?"
              hx-target="#session-area"
              hx-swap="innerHTML"
              aria-label="Delete group">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3,6 5,6 21,6"/>
          <path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/>
        </svg>
      </button>
    </div>

  </div>
  {% endfor %}
</div>
